name: Release multi-platform

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-glob: "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg"
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact-glob: "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-glob: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-glob: "src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Run Rust tests
        run: |
          cd src-tauri
          cargo test --lib

      - name: Run frontend tests
        run: pnpm test:unit

      - name: Build release
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pac-collector-${{ matrix.target }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
